<section class="container flex-vertical-container flex-body-main">

  <div class="flex-vertical-container" >
    {% include nav-wrapper-main.html %}

    <body id="page-top" class="index">
      <h5>Archive of posts with {{ page.type }} '{{ page.title }}'</h5>

      <ul class="posts">
        {% for post in page.posts %}
          <li>
            <span class="post-date">{{ post.date | date: "%d %B %Y" }}</span>
            <a class="post-link" href="{{ post.url | prepend: site.baseurl }}">{{ post.title }}</a>
          </li>
        {% endfor %}
      </ul>

      <!-- JS includes -->
      {% include js.html %}
    </body>

    {% include footer.html %}

  </div>

</section>
