<!-- Blog Index Section -->
<section id="blog-index">
    <div class="container">
        <div class="row">
            <div class="col-lg-12 text-center">
                <h2>Posts</h2>
                <hr class="star-primary">
            </div>
        </div>
        <div class="row">
          <ul class="list-unstyled">
            {% for post in site.posts %}
            <li>
                <h3><span class="colour-primary"><a href="{{ post.url }}">{{ post.title }}</a></span></h3>
                {% include blog-post-info.html context=post %}
                {{ post.excerpt }}
                <hr class="star-secondary">
            </li>
            {% endfor %}
        </ul>
        </div>
    </div>
</section>
