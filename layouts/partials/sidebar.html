<aside class="sidebar">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <a href="{{ .Site.BaseURL }}">
        <h1>{{ .Site.Title }}</h1>
      </a>
      <p class="lead">
        {{ with .Site.Params.description }} {{.}} {{ else }}An elegant open source and mobile first theme for <a
          href="http://hugo.spf13.com">hugo</a> made by <a href="http://twitter.com/mdo">@mdo</a>. Originally made for
        Jekyll.{{end}}
      </p>
    </div>

    <nav id="sidebar-nav-links">
      <a href="{{ .Site.BaseURL }}">Home</a>
    </nav>

    <nav id="sidebar-icon-links">
      {{ range .Site.Menus.main -}}
      <a id="{{ .Name }}-link" class="icon" title="{{ .Name }}" aria-label="{{ .Name }}" href="{{ .URL }}">
        {{- partial "svg.html" .Name -}}
      </a>
      {{- end }}
    </nav>

    <p>&copy; {{ now.Format "2006"}}. <a href="/LICENCE">MIT Licence</a></p>
  </div>
</aside>
