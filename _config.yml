# Site settings
title: Mez Pahlan
email: mez.pahlan@gmail.com
url: https://mezpahlan.github.io
description: 'I am a Web &amp; Mobile developer with a passion for Mobile technologies, Agile, DevOps, Continuous Integration, Open Source, Front End Development, and Visual Design.'

# Blog post settings
excerpt_separator: <!-- more -->
paginate: 10
paginate_path: '/blog/page:num/'

# Collection settings
collections:
  - portfolio

# Default front matter
defaults:
  -
    scope:
      path: '_posts'
      type: 'posts'
    values:
      layout: 'blog'
      author: 'Mez Pahlan'
      comments: true

# Colour settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Mez Pahlan

# Contact settings
contact:
  location: Location
  social: Around the Web
  credits: About Mez

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: google-plus
    url: https://www.google.com/+MezPahlan
  - title: twitter
    url: https://twitter.com/mezpahlan
  - title: linkedin
    url: https://www.linkedin.com/in/mezpahlan
  - title: github-alt
    url: https://github.com/mezpahlan

# Postal address (add as many lines as necessary)
address:
  - line: Bristol
  - line: UK

# Credits content
credits: 'I am a Web &amp; Mobile developer with a passion to develop code and have fun doing it!'

# Build settings
exclude: [Rakefile, Gemfile, Gemfile.lock]
include: [.nojekyll]
permalink: pretty
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Jekyll Picture Tag settings
picture:
  source: 'assets/images/_fullsize'
  output: 'generated'
  markup: 'picture'
  presets:
    # Full width pictures
    default:
      ppi: [1, 1.5]
      attr:
        class: blog-picture-full
        itemprop: image
      source_lrg:
        media: '(min-width: 40em)'
        width: 700
      source_med:
        media: '(min-width: 30em)'
        width: 450
      source_default:
        width: 350
        height: 200
    # Half width pictures
    half:
      ppi: [1, 1.5]
      attr:
        data-location: '{{location}}'
        data-active: nil
      source_lrg:
        media: '(min-width: 40em)'
        width: 400
      source_med:
        media: '(min-width: 30em)'
        width: 250
      source_default:
        width: 350
    # Self-set resolution sources. Useful if you don't want a 1:1 image size to dppx ratio.
    gallery:
      source_wide_hi:
        media: '(min-width: 40em) and (min-resolution: 1.5dppx)'
        width: 900
        height: 600
      source_wide:
        media: '(min-width: 40em)'
        width: 600
        height: 400
      source_default:
        width: 250
        height: 250

# Jekyll Archive settings
jekyll-archives:
  enabled: [tag]
  layouts:
    tag: tag-archive
  permalinks:
    tag: '/tag/:name/'
